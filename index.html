<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://imp-datas.s3.amazonaws.com/images/2026-01-05T17-13-00-446Z-favicon_chat_center.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>ImporChat</title>
    <script
      src="https://kit.fontawesome.com/0022adc953.js"
      crossorigin="anonymous"
    ></script>
    <meta
      name="google-site-verification"
      content="e4o4ZzOAt41v_dwAWv7_qQNfwhDiAgtYbhJTIue-el8"
    />
    <!-- IMPOR-HOTFIX 2026-04-30: ocultar "Métricas diarias del negocio" en /dropiboard hasta corregir cálculo backend. Ver Dropiboard.jsx (componente envuelto en {false && ...}) -->
    <script>
      (function () {
        var hideMetricasDiarias = function () {
          try {
            var headers = document.querySelectorAll("h3");
            for (var i = 0; i < headers.length; i++) {
              var h = headers[i];
              if (h && h.textContent && (h.textContent.indexOf("Métricas diarias del negocio") !== -1 || h.textContent.indexOf("Utilidad Real") !== -1)) {
                var card = h.closest(".rounded-2xl") || h.closest("div.bg-white") || h.parentElement;
                if (card && card.style && card.style.display !== "none") {
                  card.style.display = "none";
                  card.setAttribute("data-impor-hidden", "metricas-diarias");
                }
              }
            }
          } catch (e) {}
        };
        var run = function () {
          hideMetricasDiarias();
          try {
            var mo = new MutationObserver(function () { hideMetricasDiarias(); });
            mo.observe(document.body, { childList: true, subtree: true });
          } catch (e) {}
        };
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", run);
        } else {
          run();
        }
        setInterval(hideMetricasDiarias, 800);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const pathname = window.location.pathname;
      const search = window.location.search;

      const isLoginWithParams =
        (pathname === "/login" || pathname === "/home") &&
        search.includes("token=") &&
        search.includes("tienda=");

      const token = localStorage.getItem("token");

      if (token && token !== "undefined" && token !== "") {
        const shouldRedirectToChat =
          (pathname === "/login" || pathname === "/home" || pathname === "/") &&
          !isLoginWithParams;

        if (shouldRedirectToChat) {
          window.location.href = "/chat";
        }
      } else {
        if ((pathname === "/chat" || pathname === "/") && !isLoginWithParams) {
          window.location.href = "/home";
        }
      }
    </script>
  </body>
</html>
